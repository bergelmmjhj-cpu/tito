<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hotel Staff Time Clock</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>Hotel Staff Time Clock</h1>

    <section id="loginView" class="card">
      <h2>Worker Login</h2>
      <p class="muted">Sign in with your Staff ID or email.</p>
      <label>
        Staff ID or Email
        <input id="identifier" type="text" placeholder="e.g. W1001 or maria@hotel.local" autocomplete="username" />
      </label>
      <label>
        Password
        <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
      </label>
      <p id="loginError" class="error hidden"></p>
      <div class="actions">
        <button id="loginBtn" type="button">Login</button>
      </div>
    </section>

    <section id="appView" class="hidden">
      <section class="card">
        <div class="topbar">
          <div>
            <p class="muted">Welcome</p>
            <h2 id="workerName">—</h2>
          </div>
          <button id="logoutBtn" type="button" class="ghost">Logout</button>
        </div>
        <p id="liveClock" class="clock">—</p>
        <p class="status-line">
          Current status:
          <span id="statusBadge" class="badge">Not clocked in</span>
        </p>
        <label>
          Optional notes
          <input id="notes" type="text" placeholder="Add notes for this action" maxlength="500" />
        </label>
        <p id="actionError" class="error hidden"></p>
        <div class="actions">
          <button id="clockInBtn" type="button">Clock In</button>
          <button id="startBreakBtn" type="button">Start Break</button>
          <button id="endBreakBtn" type="button">End Break</button>
          <button id="clockOutBtn" type="button">Clock Out</button>
        </div>
      </section>

      <section class="card">
        <div class="topbar">
          <h2>Attendance History</h2>
          <button id="refreshHistoryBtn" type="button" class="ghost">Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Time In</th>
                <th>Break Start</th>
                <th>Break End</th>
                <th>Time Out</th>
                <th>Total Hours</th>
              </tr>
            </thead>
            <tbody id="historyBody">
              <tr>
                <td colspan="6" class="muted">No attendance history yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>

    <footer class="footer">
      <small>Demo worker: W1001 / password123</small>
    </footer>
  </main>
  <script src="./app.js"></script>
</body>
</html>
